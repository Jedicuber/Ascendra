<template id="page-todos">

<h1 id="todo_list">To-Dos</h1>
<h5 id="subtitle3">For better task management</h5>

<button id="add-btn"><strong>+ Add Task</strong></button>

<div class="todo-toolbar" aria-label="Filter tasks">
    <button class="todo-filter active" data-filter="all" type="button">All</button>
    <button class="todo-filter" data-filter="active" type="button">Active</button>
    <button class="todo-filter" data-filter="completed" type="button">Completed</button>
</div>

<p id="todo-summary" aria-live="polite"></p>
<div id="todo-list" aria-live="polite"></div>

<div
    aria-hidden="true"
    aria-labelledby="todo-dialog-title"
    aria-modal="true"
    class="popup"
    id="popup"
    role="dialog"
    tabindex="-1"
>
    <form class="popup-box" id="todo-form">

        <h2 id="todo-dialog-title">Add Task</h2>

        <label for="task-input">Task name</label>
        <input
            id="task-input"
            maxlength="120"
            placeholder="Task name"
            required
            type="text"
        >

        <label for="priority-input">Priority</label>
        <select id="priority-input">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>

        <label for="estimated-input">Estimated minutes</label>
        <input
            id="estimated-input"
            min="1"
            max="1440"
            placeholder="Example: 30"
            type="number"
        >

        <label class="no-date-label">
            <input id="no-date-input" type="checkbox">
            No due date
        </label>

        <div id="due-date-fields">
            <label for="date-input">Due date</label>
            <input id="date-input" type="date">

            <label for="time-input">Due time</label>
            <input id="time-input" type="time">
        </div>

        <label for="notes-input">Notes</label>
        <textarea
            id="notes-input"
            maxlength="500"
            placeholder="Extra details about this task"
            rows="4"
        ></textarea>

        <br><br>

        <button id="save-btn" type="submit">Save</button>
        <button id="cancel-btn" type="button">Cancel</button>

    </form>
</div>

<div class="navbar">

    </button>

<template id="page-habits">

<h1>Habit Tracker</h1>
<h5>Build better routines</h5>

<button id="addHabitBtn">+ Add Habit</button>

<div id="habitList" aria-live="polite"></div>

<div
    aria-hidden="true"
    aria-labelledby="habit-dialog-title"
    aria-modal="true"
    class="popup"
    id="habitPopup"
    role="dialog"
    tabindex="-1"
>
    <form class="popup-box" id="habitForm">

        <h2 id="habit-dialog-title">Add Habit</h2>

        <label for="habitInput">Habit name</label>
        <input
            id="habitInput"
            maxlength="120"
            placeholder="Example: Practice piano"
            required
            type="text"
        >

        <label for="habitEmoji">Emoji</label>
        <input
            id="habitEmoji"
            maxlength="4"
            placeholder="🎹"
            type="text"
        >

        <label for="habitType">Habit type</label>
        <select id="habitType">
            <option value="good">Good habit</option>
            <option value="bad">Bad habit</option>
        </select>

        <label for="habitFrequency">Frequency</label>
        <select id="habitFrequency">
            <option value="daily">Every day</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
        </select>

        <label for="habitGoal">Goal amount</label>
        <input
            id="habitGoal"
            min="1"
            placeholder="Example: 20"
            type="number"
        >

        <label for="habitUnit">Goal unit</label>
        <input
            id="habitUnit"
            maxlength="30"
            placeholder="minutes, glasses, pages..."
            type="text"
        >

        <label for="habitNotes">Notes</label>
        <textarea
            id="habitNotes"
            maxlength="500"
            placeholder="Why are you building this habit?"
            rows="4"
        ></textarea>

        <br><br>

        <button id="saveHabitBtn" type="submit">Save</button>
        <button id="cancelHabitBtn" type="button">Cancel</button>

    </form>
</div>
