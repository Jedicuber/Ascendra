<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>

    <link rel="stylesheet" href="settings.css">
</head>

<body>
<script src="settings.js">
<h1>Settings</h1>

<div id="settings-container">

    <!-- LANGUAGE -->
    <div class="setting-block">
        <h2>Language</h2>
        <div class="options">
            <button class="option-btn">English</button>
            <button class="option-btn">Spanish</button>
            <button class="option-btn">French</button>
            <button class="option-btn">Chinese</button>
        </div>
    </div>

    <!-- THEME -->
    <div class="setting-block">
        <h2>Theme</h2>
        <div class="options">
            <button class="option-btn">Dark</button>
            <button class="option-btn">Light</button>
            <button class="option-btn">Auto</button>
        </div>
    </div>

    <!-- TEXT -->
    <div class="setting-block">
        <h2>Text Size</h2>
        <div class="options">
            <button class="option-btn">Small</button>
            <button class="option-btn">Medium</button>
            <button class="option-btn">Large</button>
        </div>
    </div>

    <!-- VERSION -->
    <div class="setting-block">
        <h2>Version</h2>
        <div class="info-box">
            1.0.0
        </div>
    </div>

    <!-- DANGER ZONE -->
    <div class="setting-block danger">

        <h2>Danger Zone</h2>

        <div class="options">
            <button class="danger-btn">Reset Settings</button>
            <button class="danger-btn">Delete Data</button>
            <button class="danger-btn">Enter z9jjui</button>
        </div>

    </div>

</div>

</body>
</html>
