
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="menu.css">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Menu</title>
</head>
<body>
    <h1>Menu</h1>

    <!-- Buttons -->

<div id="nav">
    <button onclick="window.location.href='settings.html'" id="settings">
        Settings<br>
        <i id="settingsIcon" class="fa-solid fa-gears"></i>
    </button>

    <button id="stats">
        Statistics<br>
        <i class="fa-solid fa-chart-line"></i>
    </button>

    <button id="profile">
        Profile<br>
        <i class="fa-regular fa-user"></i>
    </button>

    <button id="extras">
        Extras<br>
        <i class="fa-solid fa-wand-magic-sparkles"></i>
    </button>

    <button id="privacy-security">
        Privacy<br>
        <i class="fa-solid fa-user-shield"></i>
    </button>

    <button id="help">
        Help<br>
        <i class="fa-regular fa-circle-question"></i>
    </button>

    <button id="about">
        About<br>
        <i class="fa-solid fa-info"></i>
    </button>

    <button id="credits">
        Credits<br>
        <i class="fa-solid fa-users"></i>

</html>
