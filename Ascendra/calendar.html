<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Ascendra - My Calendar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="calendar.css">

    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>


    <div class="calendar-container">

        <div class="top-title">
            <h1>Calendar</h1>
            <button class="addEvent">+ Add Event</button>
        </div>

<div class="calendar-card">
    <div class="calendar-header">
        <span id="prevMonth">‹</span>
        <h2></h2>
        <span id="nextMonth">›</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
        </thead>

        <tbody id="calendarBody"></tbody>
    </table>
</div>
    <div id="eventPopup" class="popup">
        <h2>New Event</h2>

        <input id="eventTitle" type="text" placeholder="Event name">
        <input id="eventDate" type="text" placeholder="Choose date">

        <button id="saveEvent">Save</button>
        <button id="closePopup">Close</button>
    </div>

    

       <div class="navbar">
    <button onclick="window.location.href='home.html'"><i class="fa-solid fa-mug-saucer"></i><br>Home</button>
    <button onclick="window.location.href='alerts.html'"><i class="fa-regular fa-bell"></i><br>Alerts</button>
    <button onclick="window.location.href='breathing.html'"><i class="fa-solid fa-list-check"></i><br>To-Dos</button>
    <button onclick="window.location.href='habits.html'"><i class="fa-regular fa-thumbs-up"></i><br>Habits</button>
    <button onclick="window.location.href='breathing.html'"><i class="fa-solid fa-wind"></i><br>Breathing</button>
    <button class="current" onclick="window.location.href='calendar.html'"><i class="fa-regular fa-calendar"></i><br>Calendar</button>
    <button onclick="window.location.href='journal.html'"><i class="fa-solid fa-book-open"></i><br>Journal</button>
    <button onclick="window.ocation.href='menu.html'"><i class="fa-solid fa-bars-staggered"></i><br>Menu</button>
</div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="calendar.js"></script>

</body>
</html>
