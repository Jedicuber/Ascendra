<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendra - Breathing</title>

    <link rel="stylesheet" href="breathing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <main>
        <h1>Breathing Exercises</h1>
        <p class="subtitle">Choose a breathing exercise</p>

        <section class="menu" id="exerciseMenu">
            <button onclick="chooseExercise('box')">Box Breathing<br><span>4-4-4-4</span></button>
            <button onclick="chooseExercise('calm')">Calm Breathing<br><span>5-5</span></button>
            <button onclick="chooseExercise('relax')">4-7-8 Breathing<br><span>4-7-8</span></button>
        </section>

        <section class="breathing-box">
            <h2 id="exerciseTitle">Box Breathing</h2>
            <p id="instructions">Breathe in, hold, exhale, and hold again.</p>

            <div id="circle">
                <h3 id="phaseText">Ready</h3>
                <p id="countdown">0</p>
            </div>

            <button id="startBtn" onclick="startBreathing()">Start</button>
            <button id="stopBtn" onclick="stopBreathing()">Stop</button>
        </section>
    </main>

    <nav class="navbar">
        <button onclick="window.location.href='home.html'"><i class="fa-solid fa-mug-saucer"></i><br>Home</button>
        <button onclick="window.location.href='alerts.html'"><i class="fa-regular fa-bell"></i><br>Alerts</button>
        <button onclick="window.location.href='todos.html'"><i class="fa-solid fa-list-check"></i><br>To-Dos</button>
        <button onclick="window.location.href='habits.html'"><i class="fa-regular fa-thumbs-up"></i><br>Habits</button>
        <button class="current"><i class="fa-solid fa-wind"></i><br>Breathing</button>
        <button onclick="window.location.href='calendar.html'"><i class="fa-regular fa-calendar"></i><br>Calendar</button>
        <button onclick="window.location.href='journal.html'"><i class="fa-solid fa-book-open"></i><br>Journal</button>
        <button onclick="window.location.href='menu.html'"><i class="fa-solid fa-bars-staggered"></i><br>Menu</button>
    </nav>

    <script src="breathing.js"></script>
</body>
</html>
