<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ascendra - Home</title>

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <main class="home">
<section class="hero">
    <h1 id="greeting"></h1>
    <p id="dateText"></p>
</section>

<section class="widget-grid">
    <div class="widget">
        <h2>Today's Progress</h2>
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
        <p id="progressText">0% complete</p>
    </div>

    <div class="widget">
        <h2>Today's To-Dos</h2>
        <ul id="todoList"></ul>
    </div>

    <div class="widget">
        <h2>Today's Calendar</h2>
        <ul id="calendarList"></ul>
    </div>

    <div class="widget">
        <h2>Habits</h2>
        <ul id="habitList"></ul>
    </div>
</section>
    </main>

    <nav class="navbar">
        <button class="current"><i class="fa-solid fa-mug-saucer"></i><br>Home</button>
        <button onclick="goTo('alerts.html')"><i class="fa-regular fa-bell"></i><br>Alerts</button>
        <button onclick="goTo('todos.html')"><i class="fa-solid fa-list-check"></i><br>To-Dos</button>
        <button onclick="goTo('habits.html')"><i class="fa-regular fa-thumbs-up"></i><br>Habits</button>
        <button onclick="goTo('breathing.html')"><i class="fa-solid fa-wind"></i><br>Breathing</button>
        <button onclick="goTo('calendar.html')"><i class="fa-regular fa-calendar"></i><br>Calendar</button>
        <button onclick="goTo('journal.html')"><i class="fa-solid fa-book-open"></i><br>Journal</button>
        <button><i class="fa-solid fa-bars-staggered"></i><br>Menu</button>
    </nav>

    <script src="home.js"></script>
</body>
</html>
