<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ascendra - To-Dos</title>
    <link rel="stylesheet" href="todos.css">
</head>
<body>

    <h1 id="todo_list">To-Dos</h1>
    <h5 id="subtitle3">For better task management</h5>

    <button id="add-btn">+ Add Task</button>

    <div id="todo-list"></div>

    <!-- Popup -->
    <div id="popup" class="popup">
        <div class="popup-box">
            <h2>Add Task</h2>

            <input id="task-input" type="text" placeholder="Task name">
            <input id="date-input" type="date">

            <br><br>

            <button id="save-btn">Save</button>
            <button id="cancel-btn">Cancel</button>
        </div>
    </div>

    <script>
        const addBtn = document.getElementById("add-btn");
        const popup = document.getElementById("popup");
        const saveBtn = document.getElementById("save-btn");
        const cancelBtn = document.getElementById("cancel-btn");

        const taskInput = document.getElementById("task-input");
        const dateInput = document.getElementById("date-input");
        const todoList = document.getElementById("todo-list");

        let todos = JSON.parse(localStorage.getItem("todos")) || [];

        function saveTodos() {
            localStorage.setItem("todos", JSON.stringify(todos));
        }

        function showTodos() {
            todoList.innerHTML = "";

            todos.forEach(todo => {
                const card = document.createElement("div");
                card.classList.add("todo-card");

                card.innerHTML = `
                    <div class="todo-info">
                        <div class="todo-title">${todo.task}</div>
                        <div class="todo-date">Due: ${todo.date}</div>
                    </div>

                    <button class="delete-btn">🗑️</button>
                `;

                const deleteBtn = card.querySelector(".delete-btn");

                deleteBtn.onclick = () => {
                    todos = todos.filter(t => t.id !== todo.id);
                    saveTodos();
                    showTodos();
                };

                todoList.appendChild(card);
            });
        }

        addBtn.onclick = () => {
            popup.style.display = "block";
            taskInput.focus();
        };

        cancelBtn.onclick = () => {
            popup.style.display = "none";
            taskInput.value = "";
            dateInput.value = "";
        };

        saveBtn.onclick = () => {
            const task = taskInput.value.trim();
            const date = dateInput.value;

            if (task === "" || date === "") {
                alert("Add a task and due date first!");
                return;
            }

            todos.push({
                id: Date.now(),
                task: task,
                date: date
            });

            saveTodos();
            showTodos();

            popup.style.display = "none";
            taskInput.value = "";
            dateInput.value = "";
        };

        showTodos();
    </script>

</body>
</html>
