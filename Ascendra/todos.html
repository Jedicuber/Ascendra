<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="todos.css">
    <title>Todo List</title>
</head>
<body>
    <h1 id="todo_list">Todo List</h1>
    <h5 id="subtitle3">for better task management</h5>
    <div class="todo-container">
  <h2>My To-Do List for today</h2>
  
  <!-- The Input Interface -->
  <div class="input-group">
    <input type="text" id="todo-input" placeholder="Add a new task..." maxlength="100">
    <button id="add-btn">Add Task</button>
  </div>

  <!-- Where the tasks will appear -->
  <ul id="todo-list"></ul>
</div>

<script>
  // Get DOM elements
  const todoInput = document.getElementById('todo-input');
  const addBtn = document.getElementById('add-btn');
  const todoList = document.getElementById('todo-list');

  // Function to add a task
  function addTask() {
    const taskText = todoInput.value.trim();
    
    // Check if input is empty
    if (taskText === "") {
      alert("Please enter a task!");
      return;
    }

    // Create new list item
    const li = document.createElement('li');
    li.textContent = taskText;

    // Create delete button for the task
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'X';
    deleteBtn.style.backgroundColor = '#d9534f';
    deleteBtn.style.padding = '2px 8px';
    deleteBtn.onclick = function() {
      li.remove();
    };

    // Append delete button to list item, then list item to the list
    li.appendChild(deleteBtn);
    todoList.appendChild(li);

    // Clear the input field
    todoInput.value = "";
    todoInput.focus();
  }

  // Event listener for button click
  addBtn.addEventListener('click', addTask);

  // Event listener for pressing "Enter" key
  todoInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      addTask();
    }
  });
</script>

</body>
</html>
