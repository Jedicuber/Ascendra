<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Ascendra - My Calendar</title>
    <link rel="stylesheet" href="calender - july.css">
</head>
<body>

    <!-- Sidebar Layout -->
    <div class="sidebar">
        <h2><a class="ascendraLogo">Ascendra</a></h2>
        <p>Welcome back!</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <h3 style="text-align: left; color: rgb(0, 128, 0);">Today's Tasks</h3>
        <ul class="task-list">
            <li>Plan my week</li>
            <li>Code HTML/CSS</li>
            <li>Meet with my friend</li>
        </ul>
    </div>

    <!-- Calendar Layout -->
    <div class="calendar-container">
        <div class="calendar-header">July 2026</div>

        <table>
            <!-- Days of the Week Row -->
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>

            <!-- Month Grid Rows (5 weeks) -->
            <tr>
                <td class="empty-day">28</td>
                <td class="empty-day">29</td>
                <td class="empty-day">30</td>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
                <td>11</td>
            </tr>
            <tr>
                <td>12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td class = "today">17</td> <!-- Today Highlighted -->
                <td>18</td>
            </tr>
            <tr>
                <td>19</td>
                <td>20</td>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
            </tr>
            <tr>
                <td>26</td>
                <td>27</td>
                <td>28</td>
                <td>29</td>
                <td>30</td>
                <td>31</td>
                <td class="empty-day">1</td>
            </tr>
        </table>
    </div>
</body>
</html>
