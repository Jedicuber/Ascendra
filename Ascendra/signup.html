<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Ascendra</title>
<style>
/* This body tag will turn the background light grey and align the text to the center */    
/* Sans-serif is a type of font that is more simpler without stubs on the botton of each word*/    
    body {
        background-color:rgb(240, 242, 246);
        text-align: center;
        margin: 0;
        min-height: 100vh;
        font-family: sans-serif;
    }
/* The rgb combination 0, 0, 255 is the color of true blue */    
    #sign_up {
        color:rgb(0, 0, 255);
        font-family: sans-serif;  
    }
/* the rgb combination 127, 0, 255 is the color of true purple */    
    #title {
        color:rgb(127, 0, 255);
        font-family: sans-serif;
    }
/* the rgb combination 0, 128, 0 is the color of dark green */
    #have-account{
        color:rgb(0, 128, 0);
        font-family: sans-serif;
    }
</style>
    </head>
    <body>

<form method="post" id="signupForm">
    <h1> Welcome to <strong id = "title">Ascendra</strong></h1>
        <h2 id = "sign_up">Sign Up</h2>
        <input type="text" placeholder="First Name" id="name" required>

        <br><br>

        <input type="text" placeholder="Last Name" id="surname" required>

        <br><br>

        <input type="text" placeholder="Username" id="username" required>

        <br><br>

        <input type="password" placeholder="Password" id="password" required>

        <br><br>

        <p id = "have-account">Have an <em>account?</em> <a href="login.html">Sign in</a></p>

        <br>

        <input type="submit" value="Create account">

        <br><br>
        
</form>

<br><br>

<script src="script.js"></script>
    </body>
</html>
