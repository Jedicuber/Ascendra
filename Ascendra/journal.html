<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Ascendra - Journal</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="settings.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="journal.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>

    <div class="journal-container">
        <div class="journal-header">
            <h1>Journal</h1>
            <p>Reflect on today. Remember tomorrow.</p>
        </div>

        <div class="journal-layout">

            <div class="date-grid-card">

                <div class="mini-calendar-header">
                    <button id="prevMonth">‹</button>
                    <h2 id="monthTitle">Month</h2>
                    <button id="nextMonth">›</button>
                </div>

                <div id="dateGrid" class="date-grid"></div>
            </div>

            <div class="entry-card">
                <h2 id="entryTitle">Today's Entry</h2>

                <label>Mood</label>
                <select id="mood">
                    <option value="😄 Happy">😄 Happy</option>
                    <option value="🙂 Good">🙂 Good</option>
                    <option value="😐 Okay">😐 Okay</option>
                    <option value="😔 Sad">😔 Sad</option>
                    <option value="😴 Tired">😴 Tired</option>
                </select>

                <label>How was your day?</label>
                <textarea id="dayText"></textarea>

                <label>What are you grateful for?</label>
                <textarea id="gratefulText"></textarea>

                <label>What did you learn today?</label>
                <textarea id="learnText"></textarea>

                <label>Goal for tomorrow</label>
                <textarea id="goalText"></textarea>

                <button id="saveEntry">Save Entry</button>
                <p id="statusMessage"></p>
            </div>

        </div>
    </div>

    <div class="navbar">
        <button onclick="window.location.href='home.html'"><i class="fa-solid fa-mug-saucer"></i><br>Home</button>
        <button onclick="window.location.href='alerts.html'"><i class="fa-regular fa-bell"></i><br>Alerts</button>
        <button onclick="window.location.href='todos.html'"><i class="fa-solid fa-list-check"></i><br>To-Dos</button>
        <button onclick="window.location.href='habits.html'"><i class="fa-regular fa-thumbs-up"></i><br>Habits</button>
        <button onclick="window.location.href='breathing.html'"><i class="fa-solid fa-wind"></i><br>Breathing</button>
        <button onclick="window.location.href='calendar.html'"><i class="fa-regular fa-calendar"></i><br>Calendar</button>
        <button class="current"><i class="fa-solid fa-book-open"></i><br>Journal</button>
        <button onclick="window.location.href='menu.html'"><i class="fa-solid fa-bars-staggered"></i><br>Menu</button>
    </div>
    <script src="global-settings.js"></script>

    <script src="journal.js"></script>

</body>
</html>
