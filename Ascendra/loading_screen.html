<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shooting Star</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }

    canvas {
        display: block;
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ----------------------
// Resize Canvas
// ----------------------

let backgroundStars = [];

function generateStars() {

    backgroundStars = [];

    const numberOfStars =
        Math.floor(canvas.width * canvas.height / 18000);

    for (let i = 0; i < numberOfStars; i++) {

        backgroundStars.push({

            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 4 + 2,
            type: Math.random()

        });

    }

}

function resizeCanvas() {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    generateStars();

}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

// ----------------------
// Variables
// ----------------------

let xPos = 300;
let yPos = 100;

let starSize = 0;

let stars = 5;
let starEdge = 8;

let mediumStar = 8;

let largeStars = 13;
let starStroke = largeStars + 4;

// ----------------------
// Circle Helper
// ----------------------

function circle(x, y, size, color) {

    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();

}

// ----------------------
// Draw
// ----------------------

function draw() {

    // Background

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Random stars

    for (let star of backgroundStars) {

        if (star.type < 0.75) {

            circle(star.x, star.y, star.size, "white");

        }

        else if (star.type < 0.95) {

            circle(
                star.x,
                star.y,
                star.size + 1,
                "rgb(242,241,153)"
            );

        }

        else {

            circle(
                star.x,
                star.y,
                star.size + 3,
                "orange"
            );

            circle(
                star.x,
                star.y,
                star.size + 1,
                "yellow"
            );

        }

    }

    // Center 400x400 animation

    ctx.save();

    let offsetX = (canvas.width - 400) / 2;
    let offsetY = (canvas.height - 400) / 2;

    ctx.translate(offsetX, offsetY);

    // Small stars

    circle(85,100,stars,"white");
    circle(200,150,stars,"white");
    circle(350,50,stars,"white");
    circle(313,300,stars,"white");
    circle(70,242,stars,"white");
    circle(362,200,stars,"white");
    circle(200,340,stars,"white");
    circle(165,29,stars,"white");

    // Medium stars

    circle(50,50,mediumStar,"rgb(242,241,153)");
    circle(244,70,mediumStar,"rgb(242,241,153)");
    circle(117,168,mediumStar,"rgb(242,241,153)");
    circle(270,365,mediumStar,"rgb(242,241,153)");
    circle(300,201,mediumStar,"rgb(242,241,153)");
    circle(230,271,mediumStar,"rgb(242,241,153)");
    circle(81,336,mediumStar,"rgb(242,241,153)");

    // Large stars

    circle(47,149,starStroke,"orange");
    circle(47,149,largeStars,"yellow");

    circle(330,127,starStroke,"orange");
    circle(330,127,largeStars,"yellow");

    circle(173,230,starStroke,"orange");
    circle(173,230,largeStars,"yellow");

    // Shooting star glow

    circle(xPos,yPos,starEdge,"red");

    ctx.beginPath();
    ctx.lineWidth = 5;
    ctx.strokeStyle = "orange";
    ctx.fillStyle = "yellow";

    ctx.arc(
        xPos,
        yPos,
        starSize / 2,
        0,
        Math.PI * 2
    );

    ctx.fill();
    ctx.stroke();

    ctx.restore();

    // ----------------------
    // Animation
    // ----------------------

    xPos -= 3;
    yPos += 3;

    starSize += 0.7;
    starEdge += 0.7;

    // Restart

    if (xPos < -100 || yPos > 500) {

        xPos = 300;
        yPos = 100;

        starSize = 0;
        starEdge = 8;

    }

    requestAnimationFrame(draw);

}

// Start animation

draw();

</script>

</body>
</html>
