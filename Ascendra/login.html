<!DOCTYPE html>
<html lang = "en"> 
<head> 
    <meta charset = "utf-8">
        <title>Ascendra</title>
<!--everything inside the style tag is css-->
    <style>  
            body {
                background-color:rgb(240, 242, 246);
                text-align: center;
                margin: 0;
                min-height: 100vh;
                font-family: sans-serif;     
            }
/* The rgb combination 0, 0, 255 is the color of true blue */
            #log_in {
                color:rgb(0, 0, 255);
                font-family: "cursive", sans-serif;
            }
/* The rgb combination 255, 165, 0 is the color of true orange */
            h1 {
                color:rgb(255, 165, 0);
                font-family: sans-serif;
            }
 /* The rgb combination 255, 255, 0 is the color of true yellow */
            #appname {
                background-color:rgb(255, 255, 0);
                font-family: "pacifico", sans-serif;
            }
    </style>
</head>
    <body>
        <h1>Welcome back to <strong id = "appname">Ascendra</strong>!</h1>
        <h2 id = "log_in">Log in</h2>

        <form method="post" id="login">
            <input type="text" placeholder="First Name" id="name" required>

            <br><br>

            <input type="password" placeholder="Password" id="password" required>

            <br><br>

            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            <br>

            <input type="submit" value="Log In">
        </form>
        <script src="login.js"></script>
    </body>
</html>
